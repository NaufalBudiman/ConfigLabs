<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CKI Solutions Showcase v3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #020617;
      --bg-soft: #0a1324;
      --panel: rgba(8, 16, 34, 0.8);
      --border: rgba(148, 163, 184, 0.18);
      --text: #f8fafc;
      --text-soft: rgba(248, 250, 252, 0.68);
      --cyan: #22d3ee;
      --amber: #fb923c;
      --gold: #fbbf24;
      --ok: #34d399;
      --radius-lg: 26px;
      --radius-md: 14px;
      --shadow: 0 24px 70px rgba(1, 4, 12, 0.55);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(70% 80% at 15% 10%, rgba(34, 211, 238, 0.12), transparent 60%),
        radial-gradient(70% 80% at 90% 90%, rgba(251, 146, 60, 0.12), transparent 65%),
        var(--bg);
    }

    .showcase {
      width: min(1320px, calc(100% - 36px));
      margin: 64px auto;
      padding: 48px 20px;
      border: 1px solid var(--border);
      border-radius: 32px;
      background: linear-gradient(180deg, rgba(12, 21, 41, 0.72), rgba(5, 11, 24, 0.72));
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .showcase::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(34, 211, 238, 0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34, 211, 238, 0.055) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(ellipse at center, #000 40%, transparent 90%);
      pointer-events: none;
    }

    .inner { position: relative; z-index: 1; }

    .head { text-align: center; margin-bottom: 34px; }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(251, 146, 60, 0.35);
      color: var(--amber);
      font-family: "JetBrains Mono", monospace;
      letter-spacing: 0.16em;
      font-size: 11px;
      margin-bottom: 18px;
      background: rgba(251, 146, 60, 0.08);
    }
    .eyebrow::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--amber);
      box-shadow: 0 0 10px var(--amber);
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse { 50% { opacity: 0.4; transform: scale(0.9); } }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 5.2vw, 72px);
      line-height: 1.03;
      letter-spacing: -0.035em;
      font-weight: 800;
    }
    h1 span {
      background: linear-gradient(135deg, var(--amber), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-style: italic;
    }
    .lead {
      margin: 0 auto;
      max-width: 720px;
      color: var(--text-soft);
      font-size: 16px;
      line-height: 1.7;
    }

    .tabs {
      margin: 34px 0;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .tab {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 11px 16px;
      font-size: 13px;
      color: var(--text-soft);
      background: rgba(255, 255, 255, 0.01);
      cursor: pointer;
      transition: 0.25s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 42px;
    }
    .tab:hover { border-color: rgba(34, 211, 238, 0.45); color: var(--text); }
    .tab.active {
      color: var(--cyan);
      border-color: rgba(34, 211, 238, 0.65);
      box-shadow: 0 0 20px rgba(34, 211, 238, 0.18);
      background: linear-gradient(90deg, rgba(34, 211, 238, 0.17), rgba(34, 211, 238, 0.05));
    }

    .stage {
      display: grid;
      grid-template-columns: 1.45fr 1fr;
      gap: 18px;
    }
    @media (max-width: 1060px) { .stage { grid-template-columns: 1fr; } }

    .visual, .detail {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--panel);
      overflow: hidden;
      min-height: 560px;
      position: relative;
    }

    .meta {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
      z-index: 6;
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
    }
    .live-badge, .build-badge {
      background: rgba(3, 10, 23, 0.75);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
    }
    .live-badge { color: var(--cyan); }
    .build-badge { color: var(--text-soft); }

    .scan {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(34, 211, 238, 0.7), transparent);
      z-index: 5;
      animation: scan 4.2s linear infinite;
    }
    @keyframes scan {
      0% { top: -4px; opacity: 0; }
      10%, 90% { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    .scene {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }
    .scene.active { opacity: 1; pointer-events: auto; }
    .scene-grid {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: repeat(8, 1fr);
      gap: 10px;
      padding: 52px 22px 18px;
    }
    .card {
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: var(--radius-md);
      background: linear-gradient(145deg, rgba(34, 211, 238, 0.13), rgba(251, 146, 60, 0.1));
      position: relative;
      overflow: hidden;
    }
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(90deg, transparent 0 12px, rgba(255, 255, 255, 0.05) 12px 13px);
      opacity: 0.4;
    }

    .hotspot {
      position: absolute;
      transform: translate(-50%, -50%);
      z-index: 8;
      cursor: pointer;
    }
    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--amber);
      border: 2px solid rgba(2, 6, 23, 0.8);
      box-shadow: 0 0 0 0 rgba(251, 146, 60, 0.55), 0 0 14px rgba(251, 146, 60, 0.44);
      animation: ping 1.9s ease-out infinite;
    }
    @keyframes ping {
      to { box-shadow: 0 0 0 16px rgba(251, 146, 60, 0), 0 0 14px rgba(251, 146, 60, 0.4); }
    }

    .tip {
      margin-top: 8px;
      min-width: 170px;
      padding: 8px 10px;
      background: rgba(3, 10, 23, 0.9);
      border: 1px solid rgba(251, 146, 60, 0.44);
      border-radius: 10px;
      backdrop-filter: blur(8px);
      font-size: 12px;
      line-height: 1.35;
      opacity: 0;
      transform: translateY(4px);
      transition: .2s ease;
      pointer-events: none;
    }
    .tip b { display: block; color: var(--amber); font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 0.11em; margin-bottom: 2px; }
    .hotspot:hover .tip, .hotspot:focus-within .tip { opacity: 1; transform: translateY(0); }

    .detail {
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .icon {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: var(--cyan);
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.28), rgba(34, 211, 238, 0.08));
      border: 1px solid rgba(34, 211, 238, 0.4);
    }
    .cat {
      color: var(--cyan);
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.17em;
    }
    .name {
      font-weight: 800;
      font-size: 30px;
      line-height: 1.1;
      margin: 0;
    }
    .desc {
      margin: 0;
      color: var(--text-soft);
      line-height: 1.72;
      font-size: 14px;
    }
    .features {
      list-style: none;
      margin: 4px 0 0;
      padding: 0;
      display: grid;
      gap: 8px;
      font-size: 13px;
      color: rgba(248, 250, 252, 0.83);
    }
    .features li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
    }
    .features li::before { content: "↗"; color: var(--cyan); font-weight: 800; }

    .kpis {
      margin-top: auto;
      border-top: 1px solid rgba(148, 163, 184, 0.15);
      padding-top: 16px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .kpi small {
      display: block;
      font-family: "JetBrains Mono", monospace;
      font-size: 9px;
      letter-spacing: 0.14em;
      color: rgba(248, 250, 252, 0.48);
      margin-bottom: 4px;
    }
    .kpi strong {
      color: var(--amber);
      font-size: 14px;
      letter-spacing: -0.01em;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }
  </style>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <section class="showcase" aria-labelledby="showcaseTitle">
    <div class="inner">
      <header class="head">
        <div class="eyebrow">SHOWCASE</div>
        <h1 id="showcaseTitle">Solutions <span>in motion</span></h1>
        <p class="lead">A stronger redesign: cleaner hierarchy, better contrast, lighter motion cost, and keyboard-friendly scene switching.</p>
      </header>

      <div class="tabs" role="tablist" aria-label="Solution categories" id="tabs"></div>

      <div class="stage">
        <article class="visual">
          <div class="meta">
            <div class="live-badge" id="status">LIVE · COMMAND CENTER</div>
            <div class="build-badge">CKI / SHOWCASE · V3</div>
          </div>
          <div class="scan" aria-hidden="true"></div>
          <div id="scenes"></div>
        </article>

        <aside class="detail" id="detail" aria-live="polite"></aside>
      </div>
    </div>
  </section>

  <script>
    const data = {
      cmd: {
        tab: "Command Center",
        cat: "MISSION-CRITICAL OPS",
        name: "Command Center",
        desc: "Unified control operations with live walls, matrix switching, and decision support for 24/7 command environments.",
        features: ["4K video wall arrays", "Operator workstation clusters", "KVM and matrix control", "Round-the-clock dashboards"],
        lead: "6 - 12 WEEKS",
        proc: "INAPROC READY",
        points: [
          { x: 50, y: 33, tag: "Video Wall", label: "4K LED Array" },
          { x: 25, y: 74, tag: "Operator", label: "Multi-display desks" },
          { x: 76, y: 74, tag: "Control", label: "KVM switch fabric" }
        ],
        blocks: [
          "grid-column: 2 / span 3; grid-row: 2 / span 2;",
          "grid-column: 5 / span 3; grid-row: 2 / span 2;",
          "grid-column: 8 / span 3; grid-row: 2 / span 2;",
          "grid-column: 3 / span 7; grid-row: 5 / span 2;"
        ]
      },
      dc: {
        tab: "Data Center",
        cat: "INFRASTRUCTURE",
        name: "Data Center",
        desc: "Enterprise rack infrastructure with redundancy, thermal zoning, and resilient storage for high-availability workloads.",
        features: ["Rack and blade systems", "SAN and backup arrays", "Power and HVAC resilience", "Disaster recovery alignment"],
        lead: "8 - 16 WEEKS",
        proc: "INAPROC + MBIZMARKET",
        points: [
          { x: 30, y: 34, tag: "Compute Rack", label: "PowerEdge / ProLiant" },
          { x: 64, y: 56, tag: "Storage", label: "SAN backup fabric" },
          { x: 50, y: 80, tag: "Facility", label: "UPS and cooling" }
        ],
        blocks: [
          "grid-column: 2 / span 2; grid-row: 2 / span 5;",
          "grid-column: 5 / span 2; grid-row: 2 / span 5;",
          "grid-column: 8 / span 2; grid-row: 2 / span 5;",
          "grid-column: 11 / span 1; grid-row: 2 / span 5;"
        ]
      },
      net: {
        tab: "Network",
        cat: "CONNECTIVITY",
        name: "Network Architecture",
        desc: "High-throughput core, secure edge, and resilient segmentation designed for scale, visibility, and predictable performance.",
        features: ["Core and distribution switching", "Wi-Fi 6/7 enterprise wireless", "Next-gen firewalls", "SD-WAN branch edge"],
        lead: "4 - 8 WEEKS",
        proc: "INAPROC + SIPLAH",
        points: [
          { x: 50, y: 50, tag: "Core", label: "Switching backbone" },
          { x: 22, y: 25, tag: "Access", label: "Wireless edge AP" },
          { x: 82, y: 50, tag: "Firewall", label: "Perimeter defense" }
        ],
        blocks: [
          "grid-column: 5 / span 4; grid-row: 3 / span 3;",
          "grid-column: 2 / span 2; grid-row: 2 / span 2;",
          "grid-column: 2 / span 2; grid-row: 6 / span 2;",
          "grid-column: 9 / span 2; grid-row: 2 / span 2;",
          "grid-column: 9 / span 2; grid-row: 6 / span 2;"
        ]
      }
    };

    const tabsEl = document.getElementById("tabs");
    const scenesEl = document.getElementById("scenes");
    const detailEl = document.getElementById("detail");
    const statusEl = document.getElementById("status");

    function drawTabs() {
      tabsEl.innerHTML = Object.entries(data).map(([key, val], i) => (
        `<button class="tab ${i === 0 ? "active" : ""}" role="tab" aria-selected="${i === 0}" data-key="${key}">
          ${val.tab}
        </button>`
      )).join("");
    }

    function drawScenes() {
      scenesEl.innerHTML = Object.entries(data).map(([key, val], i) => {
        const blocks = val.blocks.map(style => `<div class="card" style="${style}"></div>`).join("");
        const points = val.points.map(p => (
          `<button class="hotspot" style="left:${p.x}%;top:${p.y}%;" aria-label="${p.tag}: ${p.label}">
            <span class="dot" aria-hidden="true"></span>
            <span class="tip"><b>${p.tag}</b>${p.label}</span>
            <span class="sr-only">${p.tag} ${p.label}</span>
          </button>`
        )).join("");
        return `<div class="scene ${i === 0 ? "active" : ""}" data-key="${key}">
          <div class="scene-grid">${blocks}</div>
          ${points}
        </div>`;
      }).join("");
    }

    function renderDetail(key) {
      const d = data[key];
      detailEl.innerHTML = `
        <div class="icon" aria-hidden="true">◈</div>
        <div class="cat">${d.cat}</div>
        <h2 class="name">${d.name}</h2>
        <p class="desc">${d.desc}</p>
        <ul class="features">${d.features.map(f => `<li>${f}</li>`).join("")}</ul>
        <div class="kpis">
          <div class="kpi"><small>LEAD TIME</small><strong>${d.lead}</strong></div>
          <div class="kpi"><small>PROCUREMENT</small><strong>${d.proc}</strong></div>
        </div>
      `;
      statusEl.textContent = `LIVE · ${d.name.toUpperCase()}`;
    }

    function switchScene(key) {
      document.querySelectorAll(".tab").forEach(t => {
        const active = t.dataset.key === key;
        t.classList.toggle("active", active);
        t.setAttribute("aria-selected", active);
      });
      document.querySelectorAll(".scene").forEach(s => s.classList.toggle("active", s.dataset.key === key));
      renderDetail(key);
    }

    drawTabs();
    drawScenes();
    renderDetail("cmd");

    tabsEl.addEventListener("click", e => {
      const btn = e.target.closest(".tab");
      if (!btn) return;
      switchScene(btn.dataset.key);
    });

    tabsEl.addEventListener("keydown", e => {
      const current = document.activeElement;
      if (!current.classList.contains("tab")) return;
      const tabs = [...tabsEl.querySelectorAll(".tab")];
      const idx = tabs.indexOf(current);
      if (e.key === "ArrowRight") {
        e.preventDefault();
        tabs[(idx + 1) % tabs.length].focus();
      } else if (e.key === "ArrowLeft") {
        e.preventDefault();
        tabs[(idx - 1 + tabs.length) % tabs.length].focus();
      } else if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        switchScene(current.dataset.key);
      }
    });
  </script>
</body>
</html>
